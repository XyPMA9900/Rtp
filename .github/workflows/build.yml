name: Build RTP

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'

      - name: Compile
        run: |
          mkdir build
          javac -d build src/main/java/rtp/Main.java

      - name: Create jar
        run: |
          jar cf RTP.jar -C build . plugin.yml

      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: RTP
          path: RTP.jar
